<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Studio Lifecycle Graph — Review Candidate</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #050912;
      --surface: #0a1120;
      --surface-raised: #101a2c;
      --surface-soft: #0d1626;
      --line: #22324a;
      --line-strong: #344866;
      --text: #f2f6ff;
      --muted: #94a3b8;
      --faint: #627089;
      --accent: #63a7ff;
      --accent-soft: rgba(99, 167, 255, 0.12);
      --cyan: #48d9cf;
      --purple: #a685ff;
      --green: #72d997;
      --amber: #f4bb63;
      --pink: #ef88ba;
      --danger: #fb7185;
      --shadow: 0 18px 55px rgba(0, 0, 0, 0.32);
      --radius: 14px;
      --font: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --mono: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 15% -10%, rgba(77, 117, 255, 0.15), transparent 34rem),
        radial-gradient(circle at 90% 0%, rgba(72, 217, 207, 0.09), transparent 30rem),
        var(--bg);
      color: var(--text);
      font-family: var(--font);
    }

    button, input { font: inherit; }

    button { color: inherit; }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr);
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      padding: 18px 24px;
      border-bottom: 1px solid rgba(86, 109, 143, 0.28);
      background: rgba(5, 9, 18, 0.88);
      backdrop-filter: blur(18px);
    }

    .identity { min-width: 260px; }

    .eyebrow {
      margin-bottom: 5px;
      color: var(--cyan);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(19px, 2vw, 27px);
      line-height: 1.15;
      letter-spacing: -0.025em;
    }

    .subtitle {
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    .search-wrap {
      position: relative;
      width: min(300px, 28vw);
    }

    .search-wrap svg {
      position: absolute;
      top: 50%;
      left: 11px;
      width: 15px;
      transform: translateY(-50%);
      color: var(--faint);
      pointer-events: none;
    }

    .search {
      width: 100%;
      height: 36px;
      padding: 0 12px 0 34px;
      border: 1px solid var(--line);
      border-radius: 9px;
      outline: none;
      background: rgba(13, 22, 38, 0.84);
      color: var(--text);
      font-size: 12px;
      transition: border-color 160ms ease, box-shadow 160ms ease;
    }

    .search:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    .control {
      height: 36px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 9px;
      background: rgba(13, 22, 38, 0.84);
      cursor: pointer;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      transition: 150ms ease;
    }

    .control:hover {
      border-color: var(--line-strong);
      color: var(--text);
      transform: translateY(-1px);
    }

    .control.active {
      border-color: rgba(99, 167, 255, 0.6);
      background: var(--accent-soft);
      color: #cfe4ff;
    }

    .contextbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-height: 42px;
      padding: 8px 24px;
      border-bottom: 1px solid rgba(86, 109, 143, 0.2);
      background: rgba(8, 14, 26, 0.72);
      color: var(--muted);
      font-size: 11px;
    }

    .stats, .legend {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .stat strong { color: var(--text); }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .line-swatch {
      width: 22px;
      height: 0;
      border-top: 2px solid var(--accent);
    }

    .line-swatch.owns { border-color: var(--purple); }
    .line-swatch.references { border-color: var(--amber); border-top-style: dashed; }
    .line-swatch.member { border-color: var(--green); }
    .line-swatch.derives { border-color: var(--cyan); border-top-style: dashed; }

    .workspace {
      position: relative;
      min-height: 0;
      overflow: auto;
      scrollbar-color: var(--line-strong) transparent;
    }

    .canvas {
      position: relative;
      width: max-content;
      min-width: 100%;
      min-height: 100%;
      padding: 24px;
    }

    .relationships {
      position: absolute;
      inset: 0;
      z-index: 1;
      width: 100%;
      height: 100%;
      overflow: visible;
      pointer-events: none;
    }

    .relation-path {
      fill: none;
      stroke-width: 1.45;
      opacity: 0.34;
      transition: opacity 160ms ease, stroke-width 160ms ease;
    }

    .relation-path.references, .relation-path.derives { stroke-dasharray: 5 5; }
    .relation-path.composes { stroke: var(--accent); }
    .relation-path.owns { stroke: var(--purple); }
    .relation-path.references { stroke: var(--amber); }
    .relation-path.member { stroke: var(--green); }
    .relation-path.derives { stroke: var(--cyan); }
    .relation-path.connects { stroke: var(--pink); }
    .relation-path.hidden { opacity: 0; }
    .relation-path.related { opacity: 0.95; stroke-width: 2.4; }
    .relation-path.unrelated { opacity: 0.055; }

    .buckets {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: repeat(var(--bucket-count), 292px);
      align-items: start;
      gap: 18px;
    }

    .bucket-column {
      display: grid;
      align-content: start;
      gap: 18px;
    }

    .buckets.stacked {
      grid-template-columns: minmax(292px, calc(100vw - 48px));
    }

    .buckets.stacked .node-stack {
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    }

    .bucket {
      position: relative;
      min-height: 180px;
      padding: 10px;
      border: 1px solid rgba(77, 101, 136, 0.25);
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(15, 25, 43, 0.72), rgba(7, 13, 24, 0.58));
      box-shadow: inset 0 1px rgba(255,255,255,0.025);
    }

    .bucket[data-layer="extension"] {
      border-color: color-mix(in srgb, var(--bucket-color) 48%, transparent);
      background: linear-gradient(180deg, color-mix(in srgb, var(--bucket-color) 10%, rgba(15, 25, 43, 0.84)), rgba(10, 13, 26, 0.7));
      box-shadow: inset 0 1px color-mix(in srgb, var(--bucket-color) 18%, transparent), 0 0 34px color-mix(in srgb, var(--bucket-color) 8%, transparent);
    }

    .bucket-header {
      display: grid;
      gap: 1px;
      min-height: 54px;
      margin-bottom: 8px;
      padding: 4px;
      border-bottom: 1px solid rgba(83, 108, 145, 0.2);
    }

    .bucket-heading {
      position: relative;
      min-width: 0;
      outline: none;
      cursor: help;
    }

    .bucket-heading:focus-visible {
      border-radius: 8px;
      box-shadow: 0 0 0 2px color-mix(in srgb, var(--bucket-color) 55%, transparent);
    }

    .bucket-tooltip {
      position: absolute;
      z-index: 40;
      top: calc(100% + 10px);
      left: 0;
      width: 270px;
      padding: 11px 12px;
      border: 1px solid color-mix(in srgb, var(--bucket-color) 42%, var(--line));
      border-radius: 10px;
      background: rgba(8, 14, 26, 0.98);
      box-shadow: var(--shadow);
      color: var(--text);
      opacity: 0;
      transform: translateY(-4px);
      transition: opacity 140ms ease, transform 140ms ease;
      pointer-events: none;
    }

    .bucket-heading:hover .bucket-tooltip,
    .bucket-heading:focus .bucket-tooltip {
      opacity: 1;
      transform: translateY(0);
    }

    .bucket-tooltip-title {
      display: block;
      font-size: 11px;
      font-weight: 850;
      line-height: 1.35;
    }

    .bucket-tooltip-description {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 10px;
      line-height: 1.5;
    }

    .bucket-title {
      overflow: hidden;
      margin: 0;
      font-size: 13px;
      font-weight: 850;
      letter-spacing: 0.055em;
      line-height: 1.35;
      text-overflow: ellipsis;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .bucket-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--faint);
      font-family: var(--mono);
      font-size: 8px;
      font-weight: 750;
      letter-spacing: 0.07em;
      line-height: 1.2;
      text-transform: uppercase;
    }

    .bucket-meta-divider { opacity: 0.55; }

    .bucket[data-layer="extension"] .bucket-layer {
      color: color-mix(in srgb, var(--bucket-color) 82%, white);
    }

    .node-stack { display: grid; gap: 9px; }

    .node {
      position: relative;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: linear-gradient(145deg, rgba(17, 28, 48, 0.98), rgba(11, 19, 33, 0.98));
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
      transition: border-color 160ms ease, box-shadow 160ms ease, opacity 160ms ease, transform 160ms ease;
    }

    .node:hover {
      border-color: color-mix(in srgb, var(--node-color) 60%, var(--line));
      transform: translateY(-1px);
    }

    .node.selected {
      border-color: var(--node-color);
      box-shadow: 0 0 0 2px color-mix(in srgb, var(--node-color) 16%, transparent), 0 12px 30px rgba(0,0,0,0.28);
    }

    .node.search-match {
      border-color: var(--node-color);
      box-shadow: 0 0 0 2px color-mix(in srgb, var(--node-color) 22%, transparent), 0 12px 30px rgba(0,0,0,0.28);
    }

    .node.search-connected {
      border-color: color-mix(in srgb, var(--node-color) 52%, var(--line-strong));
    }

    .node.unrelated { opacity: 0.24; }
    .node.filtered { display: none; }

    .node-toggle {
      width: 100%;
      display: grid;
      grid-template-columns: 30px minmax(0, 1fr) auto;
      align-items: center;
      gap: 9px;
      padding: 8px;
      border: 0;
      border-radius: inherit;
      background: transparent;
      text-align: left;
      cursor: pointer;
    }

    .node-glyph {
      display: grid;
      place-items: center;
      width: 30px;
      height: 30px;
      border: 1px solid color-mix(in srgb, var(--node-color) 40%, transparent);
      border-radius: 8px;
      background: color-mix(in srgb, var(--node-color) 9%, transparent);
      color: var(--node-color);
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 900;
    }

    .node-name {
      display: block;
      overflow: hidden;
      color: var(--text);
      font-size: 12.5px;
      font-weight: 800;
      line-height: 1.25;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .node-kind {
      display: block;
      margin-top: 2px;
      color: var(--faint);
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .chevron {
      width: 8px;
      height: 8px;
      margin-right: 3px;
      border-right: 1.5px solid var(--muted);
      border-bottom: 1.5px solid var(--muted);
      transform: rotate(45deg) translateY(-2px);
      transition: transform 160ms ease;
    }

    .node.open .chevron { transform: rotate(225deg) translate(-1px, -1px); }

    .node-body {
      display: none;
      padding: 0 10px 10px;
    }

    .node.open .node-body { display: block; }

    .description {
      margin: 0 2px 9px;
      color: var(--muted);
      font-size: 10.5px;
      line-height: 1.5;
    }

    .detail {
      margin-top: 6px;
      overflow: hidden;
      border: 1px solid rgba(77, 101, 136, 0.26);
      border-radius: 8px;
      background: rgba(5, 10, 19, 0.36);
    }

    .detail summary {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 7px 8px;
      list-style: none;
      cursor: pointer;
      color: #cbd5e1;
      font-size: 10px;
      font-weight: 750;
      user-select: none;
    }

    .detail summary::-webkit-details-marker { display: none; }

    .detail summary::before {
      content: "+";
      display: inline-grid;
      place-items: center;
      width: 14px;
      height: 14px;
      border-radius: 4px;
      background: rgba(255,255,255,0.055);
      color: var(--muted);
      font-family: var(--mono);
      font-size: 10px;
    }

    .detail[open] summary::before { content: "−"; }

    .detail-count {
      margin-left: auto;
      padding: 2px 6px;
      border-radius: 999px;
      background: rgba(99, 167, 255, 0.09);
      color: #9ec8ff;
      font-family: var(--mono);
      font-size: 9px;
    }

    .detail-list {
      display: grid;
      gap: 0;
      margin: 0;
      padding: 0 8px 7px;
      list-style: none;
    }

    .detail-list li {
      padding: 5px 2px;
      border-top: 1px solid rgba(77, 101, 136, 0.18);
      color: var(--muted);
      font-family: var(--mono);
      font-size: 9.5px;
      line-height: 1.4;
      overflow-wrap: anywhere;
    }

    .detail-list code { color: #d7e7ff; }
    .type { color: var(--cyan); }
    .required { color: var(--danger); }
    .example-list li { font-family: var(--font); }

    .empty-state {
      display: none;
      position: absolute;
      z-index: 4;
      top: 40%;
      left: 50%;
      width: 320px;
      padding: 24px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--surface-raised);
      box-shadow: var(--shadow);
      color: var(--muted);
      text-align: center;
      transform: translate(-50%, -50%);
    }

    .empty-state.visible { display: block; }

    @media (max-width: 900px) {
      .topbar { align-items: flex-start; flex-direction: column; }
      .toolbar { justify-content: flex-start; }
      .search-wrap { width: min(100%, 300px); }
      .contextbar { align-items: flex-start; flex-direction: column; }
      .legend { display: none; }
    }

    @media print {
      .topbar { position: static; }
      .toolbar { display: none; }
      .workspace { overflow: visible; }
      .canvas { transform-origin: top left; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="identity">
        <div class="eyebrow">Studio Lifecycle Graph · review candidate</div>
        <h1 id="model-title"></h1>
        <div class="subtitle" id="model-subtitle"></div>
      </div>
      <div class="toolbar" aria-label="Diagram controls">
        <label class="search-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="11" cy="11" r="7"></circle><path d="m20 20-4-4"></path></svg>
          <input id="search" class="search" type="search" placeholder="Find object, property, method…" aria-label="Find lifecycle object, property, or method" autocomplete="off">
        </label>
        <button class="control active" id="relations-toggle" type="button">Relationships</button>
        <button class="control" id="layout-toggle" type="button" aria-pressed="false">Stack categories</button>
        <button class="control" id="expand-all" type="button">Expand all</button>
        <button class="control" id="collapse-all" type="button">Collapse all</button>
        <button class="control" id="reset" type="button">Reset</button>
      </div>
    </header>
    <section class="contextbar" aria-label="Model summary">
      <div class="stats" id="stats"></div>
      <div class="legend">
        <span class="legend-item"><i class="line-swatch"></i>composes</span>
        <span class="legend-item"><i class="line-swatch owns"></i>owns</span>
        <span class="legend-item"><i class="line-swatch references"></i>references</span>
        <span class="legend-item"><i class="line-swatch member"></i>assignment / membership</span>
        <span class="legend-item"><i class="line-swatch derives"></i>derives</span>
      </div>
    </section>
    <main class="workspace" id="workspace">
      <div class="canvas" id="canvas">
        <svg class="relationships" id="relationships" aria-hidden="true"></svg>
        <div class="buckets" id="buckets"></div>
        <div class="empty-state" id="empty-state">No domain objects match this search.</div>
      </div>
    </main>
  </div>
  <script id="domain-model" type="application/json">
  {
    "meta": {
      "title": "Studio Shadow Graph",
      "subtitle": "Core software-construction objects with explicitly isolated Plan, Build, Operate and App Security Kits",
      "version": "1.2.3",
      "status": "review candidate"
    },
    "buckets": [
      { "id": "kit-management", "name": "Kits Management", "description": "Versioned Kit packages and their reusable role definitions across lifecycle scopes.", "color": "#b293ff", "layer": "core", "column": "integrations", "entity_order": ["kit", "kit-role"] },
      { "id": "connectors", "name": "Integrations", "description": "Policy-controlled integrations that synchronize source control, documentation, planning, artifacts and tests.", "color": "#a685ff", "layer": "core", "column": "integrations", "entity_order": ["connector", "repository-manager", "docs-storage", "issue-tracker", "artifact-registry", "test-management"] },
      { "id": "graph", "name": "Core Model & Provenance", "description": "Canonical object types, graph projections, mappings, identity resolution, change history and source provenance.", "color": "#ef88ba", "layer": "core", "entity_order": ["lifecycle-graph", "object-type", "lifecycle-phase", "object-mapping", "canonical-identity", "shadow-node", "link", "change-record", "provenance", "sync-snapshot"] },
      { "id": "identity", "name": "Organization & Identity", "description": "Tenants, organizations, teams, people, roles, skills, assignments and explicit ownership boundaries.", "color": "#72d997", "layer": "core", "entity_order": ["tenant", "organization", "org-unit", "team", "role", "skill", "person", "person-profile", "role-assignment", "ownership"] },
      { "id": "planning", "name": "Projects & Work", "description": "Provider-neutral workspaces, projects, objectives, milestones, risks and configurable work items.", "color": "#f4bb63", "layer": "core", "entity_order": ["workspace", "project", "objective", "milestone", "risk", "work-item-type", "work-item"] },
      { "id": "content", "name": "Content: Code & Docs", "description": "Source-aware repositories, documents, Markdown structures, templates, checklists, comments and normalized text.", "color": "#48d9cf", "layer": "core", "column": "content", "entity_order": ["doc-space", "document", "repository", "branch", "repository-file", "template", "template-rule", "markdown-document", "checklist", "comment", "text-content", "markdown-section", "text-chunk"] },
      { "id": "changes", "name": "Content: Change Tracking", "description": "Durable proposed and applied code changes with commits and human review records.", "color": "#4fb8d8", "layer": "core", "column": "content", "entity_order": ["pull-request", "commit", "code-review"] },
      { "id": "automation", "name": "Automation & Controls", "description": "Governed workflows, actions, policies, validation, approvals, notifications, custom durable objects, retryable executions and evidence.", "color": "#fb7185", "layer": "core", "entity_order": ["policy", "workflow", "trigger", "action", "worker", "validator", "quality-gate", "event", "candidate-change", "custom-durable-object", "approval", "notification", "workflow-run", "action-run", "evidence"] },
      { "id": "ai", "name": "AI & Collaboration", "description": "Models, tools, agents, prompts, conversations, context snapshots, messages and auditable tool calls.", "color": "#70c7ff", "layer": "core", "entity_order": ["model", "mcp-server", "tool", "prompt-template", "agent", "conversation", "context-snapshot", "message", "tool-call"] },
      { "id": "kits", "name": "Kit: SDLC Plan", "description": "Opinionated product structures and durable lifecycle objects from intent through requirements and roadmap commitments.", "color": "#d995ff", "layer": "extension", "entity_order": ["portfolio", "product", "roadmap", "roadmap-swimlane", "roadmap-item", "intent", "vision", "discovery", "strategy", "definition", "requirement"] },
      { "id": "delivery", "name": "Kit: SDLC Build", "description": "Opinionated architecture, construction, validation, release and deployment objects for building software.", "color": "#d995ff", "layer": "extension", "entity_order": ["reference-architecture", "design-guideline", "design", "architecture-decision", "decomposition", "api-contract", "component", "test-case", "build", "ci-check", "build-artifact", "test-result", "release", "deployment"] },
      { "id": "operations", "name": "Kit: SDLC Operate", "description": "Opinionated runtime, reliability, incident-response and learning objects for operating software.", "color": "#d995ff", "layer": "extension", "column": "operate", "entity_order": ["service", "environment", "slo", "error-budget", "runbook", "operational-signal", "alert", "incident", "postmortem"] },
      { "id": "appsec", "name": "Kit: App Sec Scanner", "description": "Application-security assessment results, actionable findings and evidence-backed grading of vulnerability fixes.", "color": "#d995ff", "layer": "extension", "column": "operate", "entity_order": ["assessment-summary", "security-finding", "vulnerability-fix-grade"] }
    ],
    "entities": [
      {
        "id": "organization",
        "bucket": "identity",
        "name": "Organization",
        "kind": "aggregate root",
        "description": "A legal or operational boundary that owns people, teams, projects and source-system connections.",
        "properties": [
          { "name": "id", "type": "EntityId", "required": true },
          { "name": "name", "type": "string", "required": true },
          { "name": "slug", "type": "string", "required": true },
          { "name": "domains", "type": "string[]" },
          { "name": "created_at", "type": "timestamp" },
          { "name": "updated_at", "type": "timestamp" }
        ],
        "methods": ["list_teams() -> Team[]", "list_people() -> Person[]", "list_projects() -> Project[]", "resolve_identity(external_id) -> Person?"],
        "examples": ["Constructor", "Open-source foundation", "Customer tenant"]
      },
      {
        "id": "team",
        "bucket": "identity",
        "name": "Team",
        "kind": "entity",
        "description": "A durable group of people with ownership and delivery responsibilities.",
        "properties": [
          { "name": "id", "type": "EntityId", "required": true },
          { "name": "name", "type": "string", "required": true },
          { "name": "slug", "type": "string" },

  <script>
    const model = JSON.parse(document.getElementById('domain-model').textContent);
    const state = {
      selected: null,
      relationsVisible: true,
      categoriesStacked: false,
      query: ''
    };

    const byId = new Map(model.entities.map(entity => [entity.id, entity]));
    const bucketById = new Map(model.buckets.map(bucket => [bucket.id, bucket]));
    const bucketsElement = document.getElementById('buckets');
    const relationshipsElement = document.getElementById('relationships');
    const canvasElement = document.getElementById('canvas');
    const workspaceElement = document.getElementById('workspace');
    const searchElement = document.getElementById('search');
    const layoutToggleElement = document.getElementById('layout-toggle');
    const emptyStateElement = document.getElementById('empty-state');
    let frame = 0;

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function entitySearchText(entity) {
      const bucket = bucketById.get(entity.bucket);
      return [
        entity.name,
        entity.kind,
        entity.description,
        bucket.name,
        bucket.layer,
        ...entity.properties.flatMap(property => [property.name, property.type]),
        ...entity.methods,
        ...entity.examples
      ].join(' ').toLowerCase();
    }

    function propertyMarkup(property) {
      return `<li><code>${escapeHtml(property.name)}</code>${property.required ? ' <span class="required">*</span>' : ''}: <span class="type">${escapeHtml(property.type)}</span></li>`;
    }

    function detailMarkup(label, values, listClass = '') {
      const items = values.map(value => `<li>${escapeHtml(value)}</li>`).join('');
      return `<details class="detail"><summary>${label}<span class="detail-count">${values.length}</span></summary><ul class="detail-list ${listClass}">${items}</ul></details>`;
    }

    function nodeMarkup(entity) {
      const bucket = bucketById.get(entity.bucket);
      const properties = entity.properties.map(propertyMarkup).join('');
      const relations = model.relationships
        .filter(relationship => relationship.from === entity.id || relationship.to === entity.id)
        .map(relationship => {
          const outgoing = relationship.from === entity.id;
          const peer = byId.get(outgoing ? relationship.to : relationship.from);
          return `${outgoing ? '→' : '←'} ${relationship.label} · ${peer.name}`;
        });
      const initials = entity.name.split(/\s+/).map(word => word[0]).join('').slice(0, 2).toUpperCase();
      return `
        <article class="node" id="node-${entity.id}" data-entity-id="${entity.id}" data-search="${escapeHtml(entitySearchText(entity))}" style="--node-color:${bucket.color}">
          <button class="node-toggle" type="button" aria-expanded="false">
            <span class="node-glyph">${escapeHtml(initials)}</span>
            <span><span class="node-name">${escapeHtml(entity.name)}</span><span class="node-kind">${escapeHtml(entity.kind)}</span></span>
            <span class="chevron" aria-hidden="true"></span>
          </button>
          <div class="node-body">
            <p class="description">${escapeHtml(entity.description)}</p>
            <details class="detail"><summary>Properties<span class="detail-count">${entity.properties.length}</span></summary><ul class="detail-list">${properties}</ul></details>
            ${detailMarkup('Methods', entity.methods)}
            ${detailMarkup('Examples', entity.examples, 'example-list')}
            ${detailMarkup('Relationships', relations, 'example-list')}
          </div>
        </article>`;
    }

    function renderModel() {
      const extensionBucketIds = new Set(model.buckets.filter(bucket => bucket.layer === 'extension').map(bucket => bucket.id));
      const extensionCount = model.entities.filter(entity => extensionBucketIds.has(entity.bucket)).length;
      const coreCount = model.entities.length - extensionCount;
      document.getElementById('model-title').textContent = model.meta.title;
      document.getElementById('model-subtitle').textContent = model.meta.subtitle;
      document.getElementById('stats').innerHTML = `
        <span class="stat"><strong>${model.buckets.length}</strong> groups</span>
        <span class="stat"><strong>${coreCount}</strong> core objects</span>
        <span class="stat"><strong>${extensionCount}</strong> Kit-defined objects</span>
        <span class="stat"><strong>${model.relationships.length}</strong> relationships</span>
        <span class="stat">version <strong>${escapeHtml(model.meta.version)}</strong></span>`;

      const columns = [];
      const columnById = new Map();
      model.buckets.forEach(bucket => {
        const columnId = bucket.column || bucket.id;
        if (!columnById.has(columnId)) {
          const column = { id: columnId, buckets: [] };
          columns.push(column);
          columnById.set(columnId, column);
        }
        columnById.get(columnId).buckets.push(bucket);
      });

      bucketsElement.style.setProperty('--bucket-count', columns.length);
      bucketsElement.innerHTML = columns.map(column => `
        <div class="bucket-column" data-column-id="${escapeHtml(column.id)}">
          ${column.buckets.map(bucket => {
            const entityOrder = new Map(bucket.entity_order.map((entityId, index) => [entityId, index]));
            const entities = model.entities
              .filter(entity => entity.bucket === bucket.id)
              .sort((left, right) => entityOrder.get(left.id) - entityOrder.get(right.id));
            return `
              <section class="bucket" data-bucket-id="${bucket.id}" data-layer="${escapeHtml(bucket.layer)}" style="--bucket-color:${bucket.color}">
                <header class="bucket-header">
                  <div class="bucket-heading" tabindex="0" aria-describedby="tooltip-${bucket.id}"><h2 class="bucket-title">${escapeHtml(bucket.name)}</h2><span class="bucket-tooltip" id="tooltip-${bucket.id}" role="tooltip"><strong class="bucket-tooltip-title">${escapeHtml(bucket.name)}</strong><span class="bucket-tooltip-description">${escapeHtml(bucket.description)}</span></span></div>
                  <small class="bucket-meta"><span class="bucket-layer">${bucket.layer === 'extension' ? 'Kit' : 'Core'}</span><span class="bucket-meta-divider" aria-hidden="true">·</span><span class="bucket-count">${entities.length} element${entities.length === 1 ? '' : 's'}</span></small>
                </header>
                <div class="node-stack">${entities.map(nodeMarkup).join('')}</div>
              </section>`;
          }).join('')}
        </div>`).join('');

      bucketsElement.querySelectorAll('.node-toggle').forEach(button => {
        const updateOverflowTooltip = () => {
          const name = button.querySelector('.node-name');
          if (name.scrollWidth > name.clientWidth) {
            button.title = name.textContent;
          } else {
            button.removeAttribute('title');
          }
        };
        button.addEventListener('mouseenter', updateOverflowTooltip);
        button.addEventListener('focus', updateOverflowTooltip);
        button.addEventListener('click', event => {
          const node = event.currentTarget.closest('.node');
          const opening = !node.classList.contains('open');
          node.classList.toggle('open', opening);
          button.setAttribute('aria-expanded', String(opening));
          selectNode(node.dataset.entityId);
          scheduleRelationships();
        });
      });

      bucketsElement.querySelectorAll('details').forEach(detail => {
        detail.addEventListener('toggle', scheduleRelationships);
        detail.addEventListener('click', event => event.stopPropagation());
      });
    }

    function markerDefinitions() {
      const colors = {
        composes: '#63a7ff',
        owns: '#a685ff',
        references: '#f4bb63',
        member: '#72d997',
        derives: '#48d9cf',
        connects: '#ef88ba'
      };
      return `<defs>${Object.entries(colors).map(([type, color]) => `
        <marker id="arrow-${type}" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="${color}"></path>
        </marker>`).join('')}</defs>`;
    }

    function connectionPoints(fromRect, toRect, canvasRect) {
      const fromCenter = fromRect.left + fromRect.width / 2;
      const toCenter = toRect.left + toRect.width / 2;
      const leftToRight = fromCenter <= toCenter;
      const sameColumn = Math.abs(fromCenter - toCenter) < 30;

      if (sameColumn) {
        const downward = fromRect.top <= toRect.top;
        return {
          x1: fromCenter - canvasRect.left,
          y1: (downward ? fromRect.bottom : fromRect.top) - canvasRect.top,
          x2: toCenter - canvasRect.left,
          y2: (downward ? toRect.top : toRect.bottom) - canvasRect.top,
          vertical: true
        };
      }

      return {
        x1: (leftToRight ? fromRect.right : fromRect.left) - canvasRect.left,
        y1: fromRect.top + fromRect.height / 2 - canvasRect.top,
        x2: (leftToRight ? toRect.left : toRect.right) - canvasRect.left,
        y2: toRect.top + toRect.height / 2 - canvasRect.top,
        vertical: false
      };
    }

    function pathFor(points, index) {
      if (points.vertical) {
        const bend = Math.max(18, Math.abs(points.y2 - points.y1) * 0.46);
        const direction = points.y2 >= points.y1 ? 1 : -1;
        return `M ${points.x1} ${points.y1} C ${points.x1 + (index % 3 - 1) * 9} ${points.y1 + bend * direction}, ${points.x2 + (index % 3 - 1) * 9} ${points.y2 - bend * direction}, ${points.x2} ${points.y2}`;
      }
      const bend = Math.max(34, Math.abs(points.x2 - points.x1) * 0.42);
      const direction = points.x2 >= points.x1 ? 1 : -1;
      return `M ${points.x1} ${points.y1} C ${points.x1 + bend * direction} ${points.y1}, ${points.x2 - bend * direction} ${points.y2}, ${points.x2} ${points.y2}`;
    }

    function drawRelationships() {
      cancelAnimationFrame(frame);
      const canvasRect = canvasElement.getBoundingClientRect();
      const selected = state.selected;
      let markup = markerDefinitions();

      model.relationships.forEach((relationship, index) => {
        if (relationship.visual === false) return;
        const from = document.getElementById(`node-${relationship.from}`);
        const to = document.getElementById(`node-${relationship.to}`);
        if (!from || !to || from.classList.contains('filtered') || to.classList.contains('filtered')) return;
        const related = selected && (relationship.from === selected || relationship.to === selected);
        const unrelated = selected && !related;
        const visibilityClass = state.relationsVisible ? '' : ' hidden';
        const emphasisClass = related ? ' related' : unrelated ? ' unrelated' : '';
        const points = connectionPoints(from.getBoundingClientRect(), to.getBoundingClientRect(), canvasRect);
        markup += `<path class="relation-path ${relationship.type}${visibilityClass}${emphasisClass}" d="${pathFor(points, index)}" marker-end="url(#arrow-${relationship.type})"></path>`;
      });

      relationshipsElement.setAttribute('viewBox', `0 0 ${canvasElement.scrollWidth} ${canvasElement.scrollHeight}`);
      relationshipsElement.innerHTML = markup;
    }

    function scheduleRelationships() {
      cancelAnimationFrame(frame);
      frame = requestAnimationFrame(drawRelationships);
    }

    function clearSelection() {
      state.selected = null;
      document.querySelectorAll('.node').forEach(node => {
        node.classList.remove('selected', 'unrelated');
      });
      scheduleRelationships();
    }

    function selectNode(entityId) {
      if (state.selected === entityId) {
        clearSelection();
        return;
      }
      state.selected = entityId;
      const connectedIds = new Set();
      if (state.selected) {
        connectedIds.add(state.selected);
        model.relationships.forEach(relationship => {
          if (relationship.from === state.selected) connectedIds.add(relationship.to);
          if (relationship.to === state.selected) connectedIds.add(relationship.from);
        });
      }

      document.querySelectorAll('.node').forEach(node => {
        node.classList.toggle('selected', node.dataset.entityId === state.selected);
        node.classList.toggle('unrelated', Boolean(state.selected) && !connectedIds.has(node.dataset.entityId));
      });

      scheduleRelationships();
    }

    function setAllExpanded(expanded) {
      document.querySelectorAll('.node').forEach(node => {
        node.classList.toggle('open', expanded);
        node.querySelector('.node-toggle').setAttribute('aria-expanded', String(expanded));
        if (!expanded) node.querySelectorAll('details').forEach(detail => { detail.open = false; });
      });
      scheduleRelationships();
    }

    function applySearch() {
      state.query = searchElement.value.trim().toLowerCase();
      const matchedIds = new Set();
      const visibleIds = new Set();

      document.querySelectorAll('.node').forEach(node => {
        const matches = !state.query || node.dataset.search.includes(state.query);
        if (matches && state.query) matchedIds.add(node.dataset.entityId);
      });

      if (!state.query) {
        model.entities.forEach(entity => visibleIds.add(entity.id));
      } else {
        matchedIds.forEach(entityId => visibleIds.add(entityId));
        model.relationships.forEach(relationship => {
          if (matchedIds.has(relationship.from)) visibleIds.add(relationship.to);
          if (matchedIds.has(relationship.to)) visibleIds.add(relationship.from);
        });
      }

      let visibleCount = 0;
      document.querySelectorAll('.node').forEach(node => {
        const entityId = node.dataset.entityId;
        const visible = visibleIds.has(entityId);
        node.classList.toggle('filtered', !visible);
        node.classList.toggle('search-match', Boolean(state.query) && matchedIds.has(entityId));
        node.classList.toggle('search-connected', Boolean(state.query) && visible && !matchedIds.has(entityId));
        if (visible) visibleCount += 1;
      });
      document.querySelectorAll('.bucket').forEach(bucket => {
        const visible = bucket.querySelectorAll('.node:not(.filtered)').length;
        bucket.style.display = visible ? '' : 'none';
        bucket.querySelector('.bucket-count').textContent = `${visible} element${visible === 1 ? '' : 's'}`;
      });
      document.querySelectorAll('.bucket-column').forEach(column => {
        column.style.display = [...column.querySelectorAll('.bucket')].some(bucket => bucket.style.display !== 'none') ? '' : 'none';
      });
      emptyStateElement.classList.toggle('visible', visibleCount === 0);
      scheduleRelationships();
    }

    document.getElementById('expand-all').addEventListener('click', () => setAllExpanded(true));
    document.getElementById('collapse-all').addEventListener('click', () => setAllExpanded(false));
    layoutToggleElement.addEventListener('click', () => {
      state.categoriesStacked = !state.categoriesStacked;
      bucketsElement.classList.toggle('stacked', state.categoriesStacked);
      layoutToggleElement.classList.toggle('active', state.categoriesStacked);
      layoutToggleElement.setAttribute('aria-pressed', String(state.categoriesStacked));
      workspaceElement.scrollTo({ left: 0, behavior: 'smooth' });
      scheduleRelationships();
    });
    document.getElementById('relations-toggle').addEventListener('click', event => {
      state.relationsVisible = !state.relationsVisible;
      event.currentTarget.classList.toggle('active', state.relationsVisible);
      scheduleRelationships();
    });
    document.getElementById('reset').addEventListener('click', () => {
      searchElement.value = '';
      state.query = '';
      clearSelection();
      state.relationsVisible = true;
      state.categoriesStacked = false;
      document.getElementById('relations-toggle').classList.add('active');
      bucketsElement.classList.remove('stacked');
      layoutToggleElement.classList.remove('active');
      layoutToggleElement.setAttribute('aria-pressed', 'false');
      setAllExpanded(false);
      applySearch();
      workspaceElement.scrollTo({ left: 0, top: 0, behavior: 'smooth' });
    });
    searchElement.addEventListener('input', applySearch);
    document.addEventListener('keydown', event => {
      if (event.key === 'Escape' && state.selected) clearSelection();
    });
    window.addEventListener('resize', scheduleRelationships);
    workspaceElement.addEventListener('scroll', scheduleRelationships, { passive: true });

    renderModel();
    new ResizeObserver(scheduleRelationships).observe(bucketsElement);
    scheduleRelationships();
  </script>
</body>
</html>
